<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="msapplication-TileColor" content="#00c900">
    <meta name="theme-color" content="#00c900">
    <link href="https://social.vivaldi.net/@codymkw" rel="me">
    <meta name="description" content="Visit my Animal Crossing: New Horizons island in a dream!">
    <meta name="keywords" content="CodyMKW, Animal Crossing Dream Address, Ula'ula island, ACNH dream code, Animal Crossing New Horizons, ACNH memorials, Etika memorial, Satoru Iwata memorial, ACNH villagers, island tour, Nintendo Switch gaming, ACNH visitor count, Ula'ula ACNH">
    <meta name="author" content="CodyMKW">
    <meta property="og:title" content="Dream Address - CodyMKW">
    <meta property="og:description" content="Visit my Animal Crossing: New Horizons island in a dream!">
    <meta property="og:image" content="/assets/images/emojis/acLuna.png">
    <meta property="og:url" content="https://codymkw.github.io">
    <meta property="og:type" content="website">
    <meta name="twitter:creator" content="@CodyMKW" />
    <meta name="twitter:title" content="Dream Address - CodyMKW" />
    <meta name="twitter:description" content="Visit my Animal Crossing: New Horizons island in a dream!" />
    <meta name="twitter:image:src" content="/assets/images/emojis/acLuna.png" />
    <link id="theme-style" rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/emoji.css">
    <script defer src="assets/javascript/main.js"></script>
    <script defer src="assets/javascript/stickyheader.js"></script>
    <title>Dream Address - CodyMKW</title>
</head>

<body>
    <div id="sticky-header" class="sticky-header" style="display: none;">
        <span id="close-button" onclick="toggleHeader()">X</span>
        <a href="" target="_blank" class="important"></a>
    </div>
    <div class="container">
        {% include header.html %}
        <div class="content" id="DreamAddressContent">
            
            <header class="island-header">
                <h1 class="island-name"><i class="emoji acLuna"></i><br> Ula'ula</h1>
                
                <div class="dream-address-container">
                    <small class="label">DREAM ADDRESS</small>
                    <h2 id="dream-address"></h2>
                </div>
                
                <small id="dream-update-date" class="update-date"></small>
            </header>

            <figure class="featured-image">
                <img src="assets/images/ACNHWelcome.webp" alt="Welcome to Ula'ula - Animal Crossing: New Horizons">
                <figcaption>Welcome to my peaceful island paradise!</figcaption>
            </figure>

            <div id="visitor-count" class="visitor-info"></div>

            <p class="welcome-text">
                Welcome to Ula'ula! Explore and talk to our lovely residents: 
                <span id="villager-list"></span>. 
                Also, pay a visit to the memorial for 
                <a href="https://en.wikipedia.org/wiki/Etika" target="_blank">Etika</a> and 
                <a href="https://en.wikipedia.org/wiki/Satoru_Iwata" target="_blank">Satoru Iwata</a>. 😊
            </p>

            <figure class="island-map">
                <img src="assets/images/ulaula-island-map.webp" alt="Ula'ula Island Map - Full layout of CodyMKW's Animal Crossing island">
                <figcaption>Complete Map of Ula'ula Island</figcaption>
            </figure>
            <small class="last-updated">Page last updated: <!--# flastmod file="dream-address.html" fmt="%A, %B %d, %Y at %h:%mm %p" timezone="America/New_York" --></small>
        </div>
    </div>
    {% include footer.html %}
    <script>
        fetch('https://api.npoint.io/c776077c114b32d71a04')
            .then(response => response.json())
            .then(data => {
              const updateDateEl = document.getElementById('dream-update-date');
              if (updateDateEl) {
                updateDateEl.textContent = `Dream Address was last updated on ${data.date_long}`;
              }
              const visitorTextEl = document.getElementById('visitor-count');
              if (visitorTextEl) {
                visitorTextEl.innerHTML = `<b>Number of Visitors:</b> ${data.visitors} <small>(as of ${data.date_short})</small>`;
              }
              const dreamAddressEl = document.getElementById('dream-address');
              if (dreamAddressEl) {
                dreamAddressEl.textContent = data.dream_address;
              }
              const villagerEl = document.getElementById('villager-list');
              if (villagerEl && Array.isArray(data.villagers)) {
               const villagers = data.villagers;
       
               if (villagers.length === 1) {
                 villagerEl.textContent = villagers[0];
             } else if (villagers.length === 2) {
                 villagerEl.textContent = villagers[0] + ' and ' + villagers[1];
             } else {
                 villagerEl.textContent =
                   villagers.slice(0, -1).join(', ') + ', and ' + villagers[villagers.length - 1];
             }
              }
            })
            .catch(error => console.error('Error loading dream_data.json:', error));
    </script>
</body>

</html>
