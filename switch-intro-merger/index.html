<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="data:,">

    <meta property="og:title" content="Nintendo Switch Intro Adder">
    <meta property="og:description" content="Instantly prepend the iconic Switch or Switch 2 logo animation to your custom clips. Done completely in-browser.">
    <meta property="og:image" content="switch-logo.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E60012">

    <title>Switch Intro Merger</title>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg-main: #0B0B0C;
            --bg-card: #141416;
            --bg-input: #1D1E22;
            --border-color: #2A2C33;
            --text-main: #F4F5F6;
            --text-muted: #7A7E85;
            --switch-red: #E60012;
            --switch-red-glow: rgba(230, 0, 18, 0.4);
            --switch-grey: #32353C;
            --success-green: #24A148;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .workspace {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 640px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .brand img {
            height: 32px;
            width: auto;
            object-fit: contain;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .selector-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            text-align: left;
        }

        .intro-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: var(--bg-input);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .selector-option {
            display: none;
        }

        .selector-button {
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .selector-option:checked + .selector-button.switch-1 {
            background-color: var(--switch-red);
            color: white;
            box-shadow: 0 0 12px var(--switch-red-glow);
        }

        .selector-option:checked + .selector-button.switch-2 {
            background-color: var(--switch-grey);
            color: white;
            border: 1px solid #4A4E57;
        }

        .upload-zone {
            background-color: var(--bg-input);
            border: 2px dashed var(--border-color);
            border-radius: 14px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            display: block;
            margin-bottom: 24px;
        }

        .upload-zone:hover {
            border-color: var(--switch-red);
            box-shadow: 0 0 12px var(--switch-red-glow);
        }

        .upload-zone svg {
            fill: var(--text-muted);
            margin-bottom: 12px;
            transition: fill 0.2s ease;
        }

        .upload-zone:hover svg {
            fill: var(--switch-red);
        }

        .upload-zone p {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .upload-zone span {
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="file"] {
            display: none;
        }

        .preview-box {
            display: none;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        #mergeBtn {
            background-color: var(--switch-red);
            color: #ffffff;
        }

        #mergeBtn:hover:not(:disabled) {
            background-color: #ff1a2e;
            box-shadow: 0 0 16px var(--switch-red-glow);
        }

        #mergeBtn:disabled {
            background-color: #222327;
            color: #52555e;
            cursor: not-allowed;
        }

        #downloadBtn {
            display: none;
            background-color: var(--success-green);
            color: white;
        }

        #downloadBtn:hover {
            background-color: #2cbc5b;
        }

        .status-tray {
            margin-top: 20px;
            text-align: center;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            line-height: 1.5;
        }

        .log-terminal {
            display: none;
            margin-top: 16px;
            background-color: #050506;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #A0A5B0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="brand">
            <img src="switch-logo.png" alt="Switch Logo" onerror="this.style.display='none'">
            <h1>Switch Intro Merger</h1>
        </div>

        <span class="selector-label">Select Intro Animation</span>
        <div class="intro-selector">
            <label>
                <input type="radio" name="introType" value="nintendoswitchintro.mp4" class="selector-option" checked>
                <div class="selector-button switch-1">Nintendo Switch</div>
            </label>
            <label>
                <input type="radio" name="introType" value="nintendoswitch2intro.mp4" class="selector-option">
                <div class="selector-button switch-2">Nintendo Switch 2</div>
            </label>
        </div>

        <label class="upload-zone" id="dropArea">
            <svg width="32" height="32" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <p id="fileNameText">Select target video file</p>
            <span>Supports MP4, MOV, and common video profiles</span>
            <input type="file" id="videoInput" accept="video/*">
        </label>

        <div class="preview-box" id="previewBox">
            <video id="videoPreview" controls></video>
        </div>

        <button id="mergeBtn" class="btn" disabled>Merge Intro Sequence</button>
        <a id="downloadBtn" class="btn">Download Finished Clip</a>

        <div class="status-tray">
            <p class="status-text" id="statusMessage">Awaiting asset selection.</p>
            <div class="log-terminal" id="logTerminal"></div>
        </div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const fileNameText = document.getElementById('fileNameText');
        const previewBox = document.getElementById('previewBox');
        const videoPreview = document.getElementById('videoPreview');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMessage = document.getElementById('statusMessage');
        const logTerminal = document.getElementById('logTerminal');

        let targetFile = null;
        let systemLogs = [];

        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true,
            corePath: "https://unpkg.com/@ffmpeg/core-st/dist/ffmpeg-core.js",
            mainName: "main"
        });

        // Track internal engine readouts visually
        ffmpeg.setLogger(({ type, message }) => {
            systemLogs.push(`[${type}] ${message}`);
            logTerminal.textContent = systemLogs.slice(-20).join('\n');
            logTerminal.scrollTop = logTerminal.scrollHeight;
            
            if (message.includes('frame=')) {
                statusMessage.textContent = message.trim();
            }
        });

        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                targetFile = e.target.files[0];
                fileNameText.textContent = targetFile.name;
                
                const url = URL.createObjectURL(targetFile);
                videoPreview.src = url;
                previewBox.style.display = 'block';
                
                mergeBtn.disabled = false;
                mergeBtn.style.display = 'inline-flex';
                downloadBtn.style.display = 'none';
                logTerminal.style.display = 'none';
                systemLogs = [];
                statusMessage.textContent = "Ready to compile.";
            }
        });

        mergeBtn.addEventListener('click', async () => {
            if (!targetFile) return;

            try {
                mergeBtn.disabled = true;
                logTerminal.style.display = 'block';
                statusMessage.textContent = "Loading encoding toolkit...";

                if (!ffmpeg.isLoaded()) {
                    await ffmpeg.load();
                }

                const selectedIntroFile = document.querySelector('input[name="introType"]:checked').value;
                const cleanIntroUrl = new URL(selectedIntroFile, window.location.href).href;

                statusMessage.textContent = "Staging local source files...";
                ffmpeg.FS('writeFile', 'intro.mp4', await fetchFile(cleanIntroUrl));
                ffmpeg.FS('writeFile', 'user.mp4', await fetchFile(targetFile));

                statusMessage.textContent = "Aligning stream parameters and matching timelines...";
                
                // CRITICAL FIXES: Force identical 30fps frames, match audio channels to stereo layout, limit engine to 1 execution thread
                await ffmpeg.run(
                    '-i', 'intro.mp4', 
                    '-i', 'user.mp4', 
                    '-filter_complex', 
                    '[0:v]fps=30,scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,setsar=1[v0];' +
                    '[1:v]fps=30,scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,setsar=1[v1];' +
                    '[0:a]aformat=channel_layouts=stereo,aresample=44100[a0];' +
                    '[1:a]aformat=channel_layouts=stereo,aresample=44100[a1];' +
                    '[v0][a0][v1][a1]concat=n=2:v=1:a=1[outv][outa]', 
                    '-map', '[outv]', 
                    '-map', '[outa]', 
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-pix_fmt', 'yuv420p',
                    '-c:a', 'aac',
                    '-threads', '1',
                    '-movflags', '+faststart',
                    'output.mp4'
                );

                statusMessage.textContent = "Validating binary stream output...";
                const data = ffmpeg.FS('readFile', 'output.mp4');
                
                if (!data || data.length === 0) {
                    throw new Error("FFmpeg task completed but returned an empty structural file pointer.");
                }

                const compiledBlob = new Blob([data], { type: 'video/mp4' });
                const finalUrl = URL.createObjectURL(compiledBlob);
                
                videoPreview.src = finalUrl;
                downloadBtn.href = finalUrl;
                downloadBtn.download = `merged_${targetFile.name}`;
                
                downloadBtn.style.display = 'inline-flex';
                mergeBtn.style.display = 'none';
                statusMessage.textContent = "Render complete.";

            } catch (err) {
                console.error(err);
                statusMessage.innerHTML = `<span style="color:#e60012; font-weight:700;">Compilation Failed!</span><br>Check internal terminal output below for tracking errors.`;
                mergeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
