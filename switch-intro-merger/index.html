<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Discord & Social Media Embed Metadata -->
    <meta property="og:title" content="Nintendo Switch Intro Adder">
    <meta property="og:description" content="Add the iconic Nintendo Switch intro to the beginning of your videos directly in your browser.">
    <meta property="og:image" content="switch-logo.png">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E60012">

    <title>Nintendo Switch Intro Adder</title>

    <!-- Load FFmpeg.wasm from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --nintendo-red: #E60012;
            --nintendo-red-hover: #cc0010;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header img {
            max-width: 80px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--nintendo-red);
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--nintendo-red);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--nintendo-red-hover);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }

        .preview-container {
            display: none;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            max-height: 300px;
            display: block;
        }

        .status {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 10px;
            min-height: 20px;
        }

        #downloadBtn {
            display: none;
            background-color: #2ea44f;
        }
        
        #downloadBtn:hover {
            background-color: #22863a;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="switch-logo.png" alt="Switch Logo" onerror="this.style.display='none'">
            <h1>Switch Intro Adder</h1>
            <p>Select a video to prepend the Switch intro.</p>
        </div>

        <label class="upload-area" id="drop-area">
            <span id="file-name">Click to select a video file...</span>
            <input type="file" id="videoInput" accept="video/mp4,video/x-m4v,video/*">
        </label>

        <div class="preview-container" id="previewContainer">
            <video id="videoPreview" controls></video>
        </div>

        <button id="mergeBtn" class="btn" disabled>Merge Videos</button>
        <a id="downloadBtn" class="btn">Download Result</a>

        <div class="status" id="statusText"></div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const fileNameDisplay = document.getElementById('file-name');
        const previewContainer = document.getElementById('previewContainer');
        const videoPreview = document.getElementById('videoPreview');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');

        let userFile = null;

        // Initialize FFmpeg
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        // Handle file selection
        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                userFile = e.target.files[0];
                fileNameDisplay.textContent = userFile.name;
                
                // Show preview
                const objectURL = URL.createObjectURL(userFile);
                videoPreview.src = objectURL;
                previewContainer.style.display = 'block';
                mergeBtn.disabled = false;
                downloadBtn.style.display = 'none';
                statusText.textContent = "Ready to merge.";
            }
        });

        // Handle merging
        mergeBtn.addEventListener('click', async () => {
            if (!userFile) return;

            try {
                mergeBtn.disabled = true;
                statusText.textContent = 'Loading FFmpeg engine... (This might take a moment on first run)';
                
                if (!ffmpeg.isLoaded()) {
                    await ffmpeg.load();
                }

                // Log progress to the UI
                ffmpeg.setProgress(({ ratio }) => {
                    statusText.textContent = `Processing: ${Math.round(ratio * 100)}% done...`;
                });

                statusText.textContent = 'Loading files into memory...';
                
                // Fetch the local switch intro and the user's video into virtual memory
                ffmpeg.FS('writeFile', 'intro.mp4', await fetchFile('nintendoswitchintro.mp4'));
                ffmpeg.FS('writeFile', 'user.mp4', await fetchFile(userFile));

                statusText.textContent = 'Merging videos... Please wait.';

                // Run FFmpeg command to concatenate the videos
                // The concat filter ensures audio and video streams line up correctly
                await ffmpeg.run(
                    '-i', 'intro.mp4', 
                    '-i', 'user.mp4', 
                    '-filter_complex', '[0:v:0][0:a:0][1:v:0][1:a:0]concat=n=2:v=1:a=1[outv][outa]', 
                    '-map', '[outv]', 
                    '-map', '[outa]', 
                    'output.mp4'
                );

                statusText.textContent = 'Finalizing...';

                // Read the result
                const data = ffmpeg.FS('readFile', 'output.mp4');
                
                // Create a download link for the generated buffer
                const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const downloadUrl = URL.createObjectURL(videoBlob);
                
                // Update UI
                videoPreview.src = downloadUrl;
                downloadBtn.href = downloadUrl;
                downloadBtn.download = 'switch_edit_' + userFile.name;
                downloadBtn.style.display = 'block';
                mergeBtn.style.display = 'none';
                
                statusText.textContent = 'Done! You can preview it above or download it.';

            } catch (error) {
                console.error(error);
                statusText.textContent = 'An error occurred during processing. Check the console.';
                mergeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
