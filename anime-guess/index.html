<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CodyMKW // Anime Guessing Engine</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-card: rgba(10, 15, 30, 0.75);
            --bg-card-hover: rgba(16, 24, 48, 0.85);
            --border-line: rgba(255, 255, 255, 0.05);
            --text-primary: #f0f4f8;
            --text-muted: #7e8c9a;
            --accent-green: #00ff87;
            --accent-cyan: #60efff;
            --accent-red: #ff4a5a;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(0, 255, 135, 0.07) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(96, 239, 255, 0.06) 0%, transparent 45%),
                linear-gradient(to bottom, #060913, #02040a);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: var(--safe-bottom);
        }

        .page-wrap {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff 40%, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-line);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.35);
        }

        /* Config Panel */
        .panel-flex {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .input-field {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-line);
            border-radius: 10px;
            padding: 10px 12px;
            color: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent-cyan);
        }

        /* Mode Selection Buttons */
        .radio-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-line);
        }

        .radio-tab {
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.2s;
        }

        .radio-tab.active {
            background: rgba(255,255,255,0.05);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .btn-action {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
            color: #04060c;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            transition: transform 0.15s;
        }

        .btn-action:active { transform: scale(0.98); }

        /* Stats Track */
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-line);
        }
        .stats-row:last-child { border: none; }
        .stats-val { font-family: monospace; color: var(--accent-cyan); font-weight: 700; }

        /* Main Stage Layout */
        .stage {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Scoreboard Bar */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,8,16,0.4);
            border: 1px solid var(--border-line);
            padding: 14px 20px;
            border-radius: 16px;
        }

        .score-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .score-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .score-val { font-size: 1.2rem; font-family: monospace; font-weight: 800; color: #fff; }
        .score-val.streak { color: var(--accent-green); }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.03);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background: var(--accent-cyan);
            transition: width 0.1s linear;
        }

        /* Question Viewer Card */
        .viewer {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
        }

        .artwork-frame {
            width: 200px;
            height: 280px;
            background: #111625;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .artwork-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* The Pure Silhouette CSS Vector Transform Filter */
        .artwork-frame img.silhouette {
            filter: brightness(0) contrast(2);
        }

        .interaction-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: space-between;
        }

        /* Hints Engine Track */
        .hints-panel {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hint-item {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-hint {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-line);
            color: var(--text-primary);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-hint:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }

        /* Multiple Choice Grid */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .btn-choice {
            background: rgba(5,8,16,0.4);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-choice:hover:not(:disabled) {
            background: var(--bg-card-hover);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(2px);
        }

        .btn-choice.correct {
            background: rgba(0, 255, 135, 0.15) !important;
            border-color: var(--accent-green) !important;
            color: var(--accent-green);
        }

        .btn-choice.wrong {
            background: rgba(255, 74, 90, 0.15) !important;
            border-color: var(--accent-red) !important;
            color: var(--accent-red);
        }

        /* Responsive Mobile Layout Override */
        @media (max-width: 768px) {
            .game-grid { grid-template-columns: 1fr; gap: 20px; }
            .viewer { grid-template-columns: 1fr; }
            .artwork-frame { width: 100%; height: 220px; }
        }
    </style>
</head>
<body>
<div class="page-wrap">

    <header>
        <h1>CodyMKW // Anime Guessing Engine</h1>
        <a href="/" class="back-link">← Return Hub</a>
    </header>

    <div class="game-grid">
        
        <!-- Left Panel: Engine Adjustments & Stats Profile -->
        <div class="panel-flex">
            <div class="card">
                <div class="panel-flex">
                    <div class="input-group">
                        <label>AniList Target Profile</label>
                        <input type="text" id="user-input" class="input-field" placeholder="Blank for Global Top Pool">
                    </div>

                    <div class="input-group">
                        <label>Game Engine Mode</label>
                        <div class="radio-tabs">
                            <div class="radio-tab active" id="mode-classic" onclick="setMode('classic')">Classic</div>
                            <div class="radio-tab" id="mode-time" onclick="setMode('time')">Time Attack</div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Display Rules</label>
                        <button class="btn-action" style="background: rgba(255,255,255,0.03); color:#fff; border: 1px solid var(--border-line);" id="silhouette-toggle" onclick="toggleSilhouetteStyle()">Silhouette: ON</button>
                    </div>

                    <button class="btn-action" onclick="initializeGamePool()">Engage Pool</button>
                </div>
            </div>

            <div class="card">
                <div class="input-group" style="margin-bottom: 10px;">
                    <label>Terminal Record Log</label>
                </div>
                <div class="stats-row"><span>Highest Streak</span><span class="stats-val" id="stat-streak">0</span></div>
                <div class="stats-row"><span>Total Correct</span><span class="stats-val" id="stat-correct">0</span></div>
                <div class="stats-row"><span>Total Attempts</span><span class="stats-val" id="stat-total">0</span></div>
            </div>
        </div>

        <!-- Right Panel: Main Stage Target Execution -->
        <div class="stage">
            <div class="scoreboard">
                <div class="score-block">
                    <div class="score-lbl">Score Vector</div>
                    <div class="score-val" id="score-display">0000</div>
                </div>
                <div class="score-block" style="text-align: center;">
                    <div class="score-lbl">Multiplier</div>
                    <div class="score-val" id="multiplier-display">x1.0</div>
                </div>
                <div class="score-block" style="text-align: right;">
                    <div class="score-lbl">Current Streak</div>
                    <div class="score-val streak" id="streak-display">0</div>
                </div>
            </div>

            <div class="timer-container" id="timer-track">
                <div class="timer-bar" id="timer-fill"></div>
            </div>

            <div class="card">
                <div class="viewer">
                    <div class="artwork-frame">
                        <img src="" alt="Target Frame" id="target-art" class="silhouette">
                    </div>
                    
                    <div class="interaction-box">
                        <div class="hints-panel">
                            <div class="score-lbl" style="margin-bottom: 4px;">Data Buffers</div>
                            <div class="hint-item" id="hint-year-box">
                                <button class="btn-hint" onclick="revealHint('year')">Unlock Timeline</button>
                                <span style="display:none;" id="hint-year-val"></span>
                            </div>
                            <div class="hint-item" id="hint-studio-box">
                                <button class="btn-hint" onclick="revealHint('studio')">Unlock Studio Architecture</button>
                                <span style="display:none;" id="hint-studio-val"></span>
                            </div>
                            <div class="hint-item" id="hint-genres-box">
                                <button class="btn-hint" onclick="revealHint('genres')">Unlock Semantic Tags</button>
                                <span style="display:none;" id="hint-genres-val"></span>
                            </div>
                        </div>

                        <div class="choices-grid" id="choices-box">
                            <!-- Injected Choice Nodes -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// ─── Core State Engine Configuration ─────────────────────────────────────────
let gamePool = [];
let currentTarget = null;
let score = 0;
let currentStreak = 0;
let multiplier = 1.0;
let gameMode = 'classic'; // 'classic' or 'time'
let silhouetteEnabled = true;

// Time Attack Loop Scalars
let timerInterval = null;
let maxTime = 20; // Seconds per matrix execution
let timeLeft = maxTime;

// Local Archive Records
let records = {
    highestStreak: 0,
    totalCorrect: 0,
    totalAttempts: 0
};

// ─── GraphQL Queries ────────────────────────────────────────────────────────
const GLOBAL_POPULAR_QUERY = `
query {
  Page(page: 1, perPage: 80) {
    media(type: ANIME, sort: POPULARITY_DESC) {
      id title { english romaji } coverImage { extraLarge } startDate { year } studios(isMain: true) { nodes { name } } genres
    }
  }
}`;

const USER_COMPLETED_QUERY = `
query ($username: String) {
  MediaListCollection(userName: $username, type: ANIME, status: COMPLETED) {
    lists {
      entries {
        media {
          id title { english romaji } coverImage { extraLarge } startDate { year } studios(isMain: true) { nodes { name } } genres
        }
      }
    }
  }
}`;

// ─── Initialization Engine ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    loadLocalRecords();
    initializeGamePool();
});

function loadLocalRecords() {
    const saved = localStorage.getItem('cody_anime_guess_records');
    if (saved) {
        records = JSON.parse(saved);
        updateRecordsUI();
    }
}

function updateRecordsUI() {
    document.getElementById('stat-streak').innerText = records.highestStreak;
    document.getElementById('stat-correct').innerText = records.totalCorrect;
    document.getElementById('stat-total').innerText = records.totalAttempts;
}

function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-classic').classList.toggle('active', mode === 'classic');
    document.getElementById('mode-time').classList.toggle('active', mode === 'time');
    document.getElementById('timer-track').style.display = (mode === 'time') ? 'block' : 'none';
    resetState();
}

function toggleSilhouetteStyle() {
    silhouetteEnabled = !silhouetteEnabled;
    const btn = document.getElementById('silhouette-toggle');
    const img = document.getElementById('target-art');
    
    if (silhouetteEnabled) {
        btn.innerText = "Silhouette: ON";
        img.classList.add('silhouette');
    } else {
        btn.innerText = "Silhouette: OFF";
        img.classList.remove('silhouette');
    }
}

function resetState() {
    score = 0;
    currentStreak = 0;
    multiplier = 1.0;
    clearInterval(timerInterval);
    updateScoreboardUI();
}

// ─── Pool Acquisition ────────────────────────────────────────────────────────
function initializeGamePool() {
    const username = document.getElementById('user-input').value.trim();
    const isCustomUser = username.length > 0;
    
    const endpoint = 'https://graphql.anilist.co';
    const bodyConfig = isCustomUser 
        ? { query: USER_COMPLETED_QUERY, variables: { username } }
        : { query: GLOBAL_POPULAR_QUERY };

    fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyConfig)
    })
    .then(res => res.json())
    .then(payload => {
        if (isCustomUser) {
            const rawLists = payload?.data?.MediaListCollection?.lists;
            if (!rawLists || rawLists.length === 0) throw new Error("Empty user pool array context");
            gamePool = [];
            rawLists.forEach(list => {
                list.entries.forEach(entry => { if (entry.media) gamePool.push(entry.media); });
            });
        } else {
            gamePool = payload?.data?.Page?.media || [];
        }

        if (gamePool.length < 4) {
            alert("Pool execution limits compromised. Ensure target user has adequate completed items.");
            return;
        }
        
        resetState();
        injectNextRound();
    })
    .catch(err => {
        console.error(err);
        alert("GraphQL handshake failed. Reverting baseline operations.");
    });
}

// ─── Round Processing & Generation ───────────────────────────────────────────
function injectNextRound() {
    if (gamePool.length < 4) return;
    
    // Clear dynamic hint nodes
    resetHintPanels();

    // Select random correct answer
    const randIndex = Math.floor(Math.random() * gamePool.length);
    currentTarget = gamePool[randIndex];

    // Build unique multi-choice configuration
    let selections = [currentTarget];
    while (selections.length < 4) {
        const fallbackChoice = gamePool[Math.floor(Math.random() * gamePool.length)];
        if (!selections.some(item => item.id === fallbackChoice.id)) {
            selections.push(fallbackChoice);
        }
    }

    // Shuffle variants Array array
    selections.sort(() => Math.random() - 0.5);

    // Render UI structures
    const artNode = document.getElementById('target-art');
    artNode.src = currentTarget.coverImage.extraLarge;
    if (silhouetteEnabled) artNode.classList.add('silhouette');

    const choiceBox = document.getElementById('choices-box');
    choiceBox.innerHTML = '';

    selections.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'btn-choice';
        btn.innerText = choice.title.english || choice.title.romaji;
        btn.onclick = () => evaluationExecution(choice.id, btn);
        choiceBox.appendChild(btn);
    });

    if (gameMode === 'time') {
        initiateTimeAttackCountdown();
    }
}

// ─── Hint Logic Module ───────────────────────────────────────────────────────
function resetHintPanels() {
    document.getElementById('hint-year-box').querySelector('button').style.display = 'inline-block';
    document.getElementById('hint-year-val').style.display = 'none';
    document.getElementById('hint-studio-box').querySelector('button').style.display = 'inline-block';
    document.getElementById('hint-studio-val').style.display = 'none';
    document.getElementById('hint-genres-box').querySelector('button').style.display = 'inline-block';
    document.getElementById('hint-genres-val').style.display = 'none';
}

function revealHint(type) {
    if (!currentTarget) return;

    // Apply minor multiplier penalty for unlocking a dynamic buffer link
    multiplier = Math.max(1.0, multiplier - 0.2);
    updateScoreboardUI();

    if (type === 'year') {
        const display = document.getElementById('hint-year-val');
        display.innerText = `Released: ${currentTarget.startDate?.year || 'Unknown'}`;
        display.style.display = 'inline';
        document.getElementById('hint-year-box').querySelector('button').style.display = 'none';
    } else if (type === 'studio') {
        const display = document.getElementById('hint-studio-val');
        const studioName = currentTarget.studios?.nodes?.[0]?.name || 'Independent/Unknown';
        display.innerText = `Studio: ${studioName}`;
        display.style.display = 'inline';
        document.getElementById('hint-studio-box').querySelector('button').style.display = 'none';
    } else if (type === 'genres') {
        const display = document.getElementById('hint-genres-val');
        const labels = currentTarget.genres ? currentTarget.genres.slice(0, 3).join(', ') : 'None';
        display.innerText = `Tags: ${labels}`;
        display.style.display = 'inline';
        document.getElementById('hint-genres-box').querySelector('button').style.display = 'none';
    }
}

// ─── Time Attack Countdown Tracker ──────────────────────────────────────────
function initiateTimeAttackCountdown() {
    clearInterval(timerInterval);
    timeLeft = maxTime;
    const bar = document.getElementById('timer-fill');
    bar.style.width = '100%';

    timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        const pct = (timeLeft / maxTime) * 100;
        bar.style.width = `${pct}%`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleRoundFailure();
        }
    }, 100);
}

// ─── Scoring and Verification Engine ─────────────────────────────────────────
function evaluationExecution(selectedId, buttonNode) {
    clearInterval(timerInterval);
    
    // Disable alternative inputs
    const alternatives = document.querySelectorAll('.btn-choice');
    alternatives.forEach(btn => btn.disabled = true);

    // Strip silhouette mask context visually on select
    document.getElementById('target-art').classList.remove('silhouette');

    records.totalAttempts++;

    if (selectedId === currentTarget.id) {
        buttonNode.classList.add('correct');
        currentStreak++;
        records.totalCorrect++;
        
        // Compute dynamically updated scoring factors
        const addedBase = gameMode === 'time' ? Math.round(timeLeft * 10) : 100;
        score += Math.round(addedBase * multiplier);
        
        // Multiplier progression tracker
        multiplier = parseFloat((multiplier + 0.1).toFixed(1));
        
        if (currentStreak > records.highestStreak) {
            records.highestStreak = currentStreak;
        }
    } else {
        buttonNode.classList.add('wrong');
        highlightCorrectOption();
        currentStreak = 0;
        multiplier = 1.0;
    }

    localStorage.setItem('cody_anime_guess_records', JSON.stringify(records));
    updateScoreboardUI();
    updateRecordsUI();

    setTimeout(injectNextRound, 1800);
}

function handleRoundFailure() {
    const alternatives = document.querySelectorAll('.btn-choice');
    alternatives.forEach(btn => btn.disabled = true);
    document.getElementById('target-art').classList.remove('silhouette');

    records.totalAttempts++;
    currentStreak = 0;
    multiplier = 1.0;

    highlightCorrectOption();

    localStorage.setItem('cody_anime_guess_records', JSON.stringify(records));
    updateScoreboardUI();
    updateRecordsUI();

    setTimeout(injectNextRound, 1800);
}

function highlightCorrectOption() {
    const alternatives = document.querySelectorAll('.btn-choice');
    alternatives.forEach(btn => {
        // Fallback title checks matching array generation patterns
        const correctTitle = currentTarget.title.english || currentTarget.title.romaji;
        if (btn.innerText === correctTitle) {
            btn.classList.add('correct');
        }
    });
}

function updateScoreboardUI() {
    document.getElementById('score-display').innerText = String(score).padStart(4, '0');
    document.getElementById('streak-display').innerText = currentStreak;
    document.getElementById('multiplier-display').innerText = `x${multiplier.toFixed(1)}`;
}
</script>
</body>
</html>
