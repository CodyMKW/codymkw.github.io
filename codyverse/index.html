<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codyverse Plaza</title>
    <style>
        :root {
            --miiverse-green: #92e600;
            --miiverse-green-hover: #7bc200;
            --bg-dark: #15202b;
            --card-dark: #1e2732;
            --border-color: #38444d;
            --text-main: #ffffff;
            --text-muted: #8899a6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0;
            display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 650px; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); min-height: 100vh; padding-bottom: 50px; }
        header { position: sticky; top: 0; background: rgba(21, 32, 43, 0.85); backdrop-filter: blur(5px); padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        h1 { font-size: 1.4rem; margin: 0; color: var(--miiverse-green); font-weight: 800; }
        .community-bar { display: flex; overflow-x: auto; background: var(--card-dark); border-bottom: 1px solid var(--border-color); padding: 5px 10px; gap: 8px; }
        .comm-tab { padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; color: var(--text-muted); cursor: pointer; border: 1px solid transparent; white-space: nowrap; }
        .comm-tab.active { background: rgba(146, 230, 0, 0.15); color: var(--miiverse-green); border-color: var(--miiverse-green); }
        .btn { background-color: var(--miiverse-green); color: #000; border: none; padding: 8px 16px; border-radius: 9999px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
        .btn:hover { background-color: var(--miiverse-green-hover); }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }
        .panel { padding: 20px; border-bottom: 1px solid var(--border-color); background: var(--card-dark); }
        .input-group { margin-bottom: 12px; }
        input, textarea { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        textarea { resize: none; height: 80px; font-family: inherit; }
        .post { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 12px; }
        .avatar { width: 48px; height: 48px; background: #4b5563; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 1.2rem; border: 2px solid var(--miiverse-green); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-content { flex: 1; }
        .post-header { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
        .display-name { font-weight: bold; }
        .username { color: var(--text-muted); font-size: 0.9rem; }
        .post-body { line-height: 1.4; font-size: 1rem; word-break: break-word; }
        .post-actions { margin-top: 10px; display: flex; gap: 15px; }
        .action-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .yeah-btn { border-color: #ff7f00; color: #ff7f00; }
        .yeah-btn.active { background: #ff7f00; color: white; }
        .reply-btn { border-color: #00a2ff; color: #00a2ff; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--card-dark); padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid var(--border-color); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title-banner">💚 Codyverse Plaza</h1>
            <div id="user-header"></div>
        </header>

        <div class="community-bar" id="communities-list">
            <div class="comm-tab active" onclick="switchCommunity('general')">💬 General Community</div>
            <div class="comm-tab" onclick="switchCommunity('splatoon')">🦑 Splatoon Zone</div>
            <div class="comm-tab" onclick="switchCommunity('animal_crossing')">🍃 Animal Crossing Area</div>
            <div class="comm-tab" onclick="switchCommunity('webdev')">💻 Web Dev Labs</div>
            <div class="comm-tab" onclick="switchCommunity('anime')">📺 Dubbed Anime Lounge</div>
        </div>

        <div id="profile-section" class="panel hidden">
            <h3>🎨 Personalize Identity Settings</h3>
            <div class="input-group"><input type="text" id="prof-displayname" placeholder="Display Name"></div>
            <div class="input-group"><input type="text" id="prof-avatar" placeholder="Direct URL Image path (e.g. https://...png)"></div>
            <div class="input-group"><textarea id="prof-bio" placeholder="Bio updates..."></textarea></div>
            <button class="btn" onclick="updateProfile()">Apply Profile Upgrades</button>
            <button class="btn btn-outline" onclick="toggleProfileEdit()">Cancel</button>
        </div>

        <div id="auth-section" class="panel hidden">
            <h3 id="auth-title">Sign In to Codyverse</h3>
            <div class="input-group" id="dn-group" style="display:none;"><input type="text" id="auth-displayname" placeholder="Display Name"></div>
            <div class="input-group"><input type="text" id="auth-username" placeholder="Username"></div>
            <div class="input-group"><input type="password" id="auth-password" placeholder="Password"></div>
            <button class="btn" id="auth-main-btn" onclick="handleAuth()">Sign In</button>
            <button class="btn btn-outline" id="auth-toggle-btn" onclick="toggleAuthMode()" style="margin-left: 10px;">Create Account</button>
        </div>

        <div id="post-section" class="panel hidden">
            <textarea id="post-text" placeholder="Share your status with this community..."></textarea>
            <div style="display: flex; justify-content: space-between; margin-top: 8px; align-items: center;">
                <button class="btn btn-outline" onclick="toggleProfileEdit()">Profile / Custom Avatar</button>
                <button class="btn" onclick="submitPost()">Post</button>
            </div>
        </div>

        <div id="feed" class="feed"></div>
    </div>

    <div id="reply-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top:0;">Discussion Thread</h3>
            <div id="modal-parent-post"></div>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
            <div id="modal-replies-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <div class="input-group"><textarea id="reply-text" placeholder="Add to the conversation..."></textarea></div>
            <button class="btn" onclick="submitReply()">Send Reply</button>
            <button class="btn btn-outline" onclick="closeReplyModal()">Dismiss</button>
        </div>
    </div>

    <script>
        // 🌟 POINT THIS TO YOUR DEPLOYED BACKEND
        const API_BASE = "https://codyverse.codymkw.workers.dev"; 

        let isSignUp = false, currentUser = null, currentProfile = null, currentCommunity = "general", activePostId = null;

        async function apiFetch(endpoint, options = {}) {
            options.credentials = 'include';
            if (options.body && typeof options.body === 'object') {
                options.body = JSON.stringify(options.body);
                options.headers = { ...options.headers, 'Content-Type': 'application/json' };
            }
            return fetch(`${API_BASE}${endpoint}`, options);
        }

        async function checkAuth() {
            try {
                const res = await apiFetch('/api/me');
                const data = await res.json();
                currentUser = data.username;
                currentProfile = data.profile;
                
                if (currentUser) {
                    const activeAvatar = currentProfile && currentProfile.avatarUrl ? currentProfile.avatarUrl : '';
                    document.getElementById('user-header').innerHTML = `
                        <div style="display:flex; align-items:center; gap:8px;">
                            ${renderAvatar(activeAvatar, currentProfile?.displayName || currentUser)}
                            <button class="btn btn-outline" onclick="logout()">Log Out</button>
                        </div>`;
                    document.getElementById('post-section').classList.remove('hidden');
                    document.getElementById('auth-section').classList.add('hidden');
                    if(currentProfile) {
                        document.getElementById('prof-displayname').value = currentProfile.displayName || '';
                        document.getElementById('prof-avatar').value = currentProfile.avatarUrl || '';
                        document.getElementById('prof-bio').value = currentProfile.bio || '';
                    }
                } else {
                    document.getElementById('user-header').innerHTML = '';
                    document.getElementById('auth-section').classList.remove('hidden');
                    document.getElementById('post-section').classList.add('hidden');
                }
            } catch(e) { console.error(e); }
        }

        function switchCommunity(target) {
            currentCommunity = target;
            const tabs = document.querySelectorAll('.comm-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadPosts();
        }

        async function updateProfile() {
            const res = await apiFetch('/api/profile/update', {
                method: 'POST',
                body: {
                    displayName: document.getElementById('prof-displayname').value,
                    avatarUrl: document.getElementById('prof-avatar').value,
                    bio: document.getElementById('prof-bio').value
                }
            });
            if(res.ok) {
                toggleProfileEdit();
                await checkAuth();
                loadPosts();
            }
        }

        function toggleProfileEdit() { document.getElementById('profile-section').classList.toggle('hidden'); }
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? 'Create Codyverse Account' : 'Sign In to Codyverse';
            document.getElementById('dn-group').style.display = isSignUp ? 'block' : 'none';
            document.getElementById('auth-main-btn').innerText = isSignUp ? 'Register' : 'Sign In';
        }

        async function handleAuth() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;
            const displayName = document.getElementById('auth-displayname').value;
            const res = await apiFetch(isSignUp ? '/api/register' : '/api/login', {
                method: 'POST', body: isSignUp ? { username, password, displayName } : { username, password }
            });
            if(res.ok) { if(isSignUp) { toggleAuthMode(); } else { await checkAuth(); loadPosts(); } } else { alert(await res.text()); }
        }

        async function logout() { await apiFetch('/api/logout'); window.location.reload(); }

        function renderAvatar(url, name) {
            return url ? `<div class="avatar"><img src="${url}" onerror="this.style.display='none'"></div>` : `<div class="avatar">${name.charAt(0).toUpperCase()}</div>`;
        }

        async function loadPosts() {
            const res = await apiFetch(`/api/posts?community=${currentCommunity}`);
            const posts = await res.json();
            const feedEl = document.getElementById('feed');
            if (posts.length === 0) { feedEl.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted)">No posts inside this hub quadrant yet.</div>'; return; }

            feedEl.innerHTML = posts.map(post => {
                const isYeahed = post.yeahedBy && post.yeahedBy.includes(currentUser);
                return `
                    <div class="post">
                        ${renderAvatar(post.avatarUrl, post.displayName)}
                        <div class="post-content">
                            <div class="post-header">
                                <span class="display-name">${post.displayName}</span>
                                <span class="username">@${post.username}</span>
                            </div>
                            <div class="post-body">${escapeHtml(post.content)}</div>
                            <div class="post-actions">
                                <button class="action-btn yeah-btn ${isYeahed ? 'active' : ''}" onclick="giveYeah('${post.id}')">💚 Yeah! (${post.yeahs || 0})</button>
                                <button class="action-btn reply-btn" onclick="openReplyModal('${post.id}', '${post.displayName}', '${post.username}', \`${escapeHtml(post.content)}\`, '${post.avatarUrl}')">💬 Replies (${post.replyCount || 0})</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function submitPost() {
            const content = document.getElementById('post-text').value;
            if(!content) return;
            const res = await apiFetch('/api/posts', { method: 'POST', body: { content, community: currentCommunity } });
            if (res.ok) { document.getElementById('post-text').value = ''; loadPosts(); }
        }

        async function giveYeah(postId) {
            if(!currentUser) return alert('Sign in to leave a "Yeah!"');
            const res = await apiFetch('/api/yeah', { method: 'POST', body: { postId, community: currentCommunity } });
            if(res.ok) loadPosts();
        }

        async function openReplyModal(postId, displayName, username, content, avatarUrl) {
            activePostId = postId;
            document.getElementById('modal-parent-post').innerHTML = `
                <div style="display:flex; gap:10px; opacity:0.8;">
                    ${renderAvatar(avatarUrl, displayName)}
                    <div>
                        <strong>${displayName}</strong> <span style="color:var(--text-muted)">@${username}</span>
                        <div style="margin-top:4px;">${content}</div>
                    </div>
                </div>`;
            document.getElementById('reply-modal').classList.remove('hidden');
            loadReplies();
        }

        function closeReplyModal() { document.getElementById('reply-modal').classList.add('hidden'); activePostId = null; }

        async function loadReplies() {
            const res = await apiFetch(`/api/replies?postId=${activePostId}`);
            const replies = await res.json();
            const listEl = document.getElementById('modal-replies-list');
            if(replies.length === 0) { listEl.innerHTML = '<p style="color:var(--text-muted); text-align:center;">No responses logged.</p>'; return; }
            
            listEl.innerHTML = replies.map(r => `
                <div style="display:flex; gap:10px; margin-bottom:12px; font-size:0.95rem;">
                    ${renderAvatar(r.avatarUrl, r.displayName)}
                    <div>
                        <strong>${r.displayName}</strong> <span style="color:var(--text-muted)">@${r.username}</span>
                        <div style="margin-top:2px;">${escapeHtml(r.content)}</div>
                    </div>
                </div>
            `).join('');
        }

        async function submitReply() {
            const content = document.getElementById('reply-text').value;
            if(!content || !activePostId) return;
            const res = await apiFetch('/api/replies/create', { method: 'POST', body: { postId: activePostId, content, community: currentCommunity } });
            if(res.ok) { document.getElementById('reply-text').value = ''; loadReplies(); loadPosts(); }
        }

        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        (async () => { await checkAuth(); loadPosts(); })();
    </script>
</body>
</html>
