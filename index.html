<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodyMKW | Home</title>
    <style>
        :root {
            --accent: #4ade80;
            --bg: #0d1117;
            --glass: rgba(22, 27, 34, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 50% 50%, #1a202c, #0d1117);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 { margin: 0 0 0.5rem; color: #fff; }
        p { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }

        .btn {
            display: block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }

        #anilist-box {
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            text-align: left;
            font-size: 0.85rem;
        }
        .anime-item { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .anime-item img { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <h1>CodyMKW</h1>
        <p>Developer & Gamer. You've reached my hub.</p>
        
        <a href="https://codymkw.nekoweb.org" class="btn">Enter Main Site</a>

        <div id="anilist-box">
            <div id="status">Checking what I'm watching...</div>
        </div>
    </div>

    <script>
        const query = `
        query {
            MediaListCollection(userName: "CodyMKW", type: ANIME, status: CURRENT) {
                lists { entries { media { title { romaji } coverImage { large } siteUrl } } }
            }
        }`;

        fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
        })
        .then(res => res.json())
        .then(data => {
            const list = data.data.MediaListCollection.lists[0].entries;
            const container = document.getElementById('status');
            if (list.length > 0) {
                const anime = list[0].media;
                container.innerHTML = `
                    <div style="color: #8b949e; margin-bottom: 5px;">Currently Watching:</div>
                    <a href="${anime.siteUrl}" style="text-decoration:none; color:inherit" target="_blank" class="anime-item">
                        <img src="${anime.coverImage.large}">
                        <span>${anime.title.romaji}</span>
                    </a>
                `;
            } else {
                container.innerHTML = "Not currently watching anything.";
            }
        })
        .catch(() => {
            document.getElementById('status').innerText = "AniList stats currently unavailable.";
        });
    </script>
</body>
</html>
