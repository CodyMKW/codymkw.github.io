<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cody's Website</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; 
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 16px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background-color: #238636; 
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            padding: 12px 24px;
            border-radius: 6px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            transition: background-color 0.2s ease-in-out;
        }

        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hey there!</h1>
        <p>You've landed on my old page. I've moved everything over to a new home, so come check it out!</p>
        <a href="https://codymkw.nekoweb.org" class="btn">Take me to the site</a>
    </div>

</body>
</html>
