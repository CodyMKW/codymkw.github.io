title: "CodyMKW"
description: "Just Cody's little page on the interwebz! :)"
url: "https://codymkw.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-sitemap

# Include files
include:
  - _pages
  - posts

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - posts/*.md
  - gemfiles/

# Include files
include:
  - _pages
  - blogdata